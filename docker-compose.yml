services:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mujcode_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      HOST: "0.0.0.0"
      TOKEN_SECRET: ${TOKEN_SECRET:-mujcode-local-dev-secret}
      DB_FILE: src/data/db.json
      UPLOAD_DIR: uploads
    volumes:
      # Persist uploads and database between restarts
      - backend_uploads:/app/uploads
      - ./backend/src/data:/app/src/data
    networks:
      - mujcode-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mujcode-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - mujcode-net
    depends_on:
      backend:
        condition: service_started

  # ── Databases ────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: mujcode_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - mujcode-net
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:latest
    container_name: mujcode_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    networks:
      - mujcode-net
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: postgres:15-alpine
    container_name: mujcode_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: mujcode_db
    ports:
      - "5432:5432"
    networks:
      - mujcode-net
    volumes:
      - postgres_data:/var/lib/postgresql/data

# ── Named Volumes ─────────────────────────────────────────────────────────
volumes:
  backend_uploads:
    name: mujcode_uploads
  backend_data:
    name: mujcode_data
  redis_data:
    name: mujcode_redis_data
  mongodb_data:
    name: mujcode_mongodb_data
  postgres_data:
    name: mujcode_postgres_data

# ── Network ───────────────────────────────────────────────────────────────
networks:
  mujcode-net:
    name: mujcode-network
    driver: bridge
